<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint - Urban Governance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/Emblem.jpg" alt="Government Emblem" class="navbar-emblem"> Urban Governance Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="complaint.html">Submit Complaint</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn-register" href="register.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Complaint Form Section -->
    <section class="complaint-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="complaint-card">
                        <div class="complaint-header text-center">
                            <div class="complaint-icon">
                                <i class="fas fa-bullhorn"></i>
                            </div>
                            <h2>File a Complaint</h2>
                            <p>Help us improve your city by reporting issues</p>
                        </div>
                        
                        <form class="complaint-form">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="name">
                                            <i class="fas fa-user"></i> Your Name
                                        </label>
                                        <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="department">
                                            <i class="fas fa-building"></i> Department
                                        </label>
                                        <select id="department" class="form-control" required>
                                            <option value="">Select Department</option>
                                            <option value="Water">💧 Water Services</option>
                                            <option value="Electricity">⚡ Electricity</option>
                                            <option value="Sanitation">♻️ Sanitation</option>
                                            <option value="Road">🛣️ Road & Infrastructure</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="description">
                                    <i class="fas fa-comment-alt"></i> Issue Description
                                </label>
                                <textarea id="description" class="form-control" rows="5" placeholder="Please describe the issue in detail..." required></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="location">
                                            <i class="fas fa-map-marker-alt"></i> Location
                                        </label>
                                        <input type="text" class="form-control" id="location" placeholder="Enter location or address">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="priority">
                                            <i class="fas fa-exclamation-triangle"></i> Priority
                                        </label>
                                        <select id="priority" class="form-control">
                                            <option value="Low">Low</option>
                                            <option value="Medium" selected>Medium</option>
                                            <option value="High">High</option>
                                            <option value="Critical">Critical</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="text-center mt-4">
                                <button type="button" class="btn btn-complaint-submit" onclick="submitComplaint()">
                                    <i class="fas fa-paper-plane"></i> Submit Complaint
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/complaint.js"></script>
</body>
</html>
